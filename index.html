<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regression AI | Prediction Portal</title>
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 2rem; border-radius: 1rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); width: 100%; max-width: 500px; border: 1px solid #334155; }
        h2 { text-align: center; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1.5rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        label { font-size: 0.8rem; color: #94a3b8; display: block; margin-bottom: 0.25rem; }
        input { width: 90%; background: #0f172a; border: 1px solid #334155; color: white; padding: 0.6rem; border-radius: 0.5rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        .full-width { grid-column: span 2; margin-top: 1rem; }
        button { width: 100%; padding: 0.8rem; background: linear-gradient(to right, var(--primary), var(--secondary)); border: none; border-radius: 0.5rem; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .result-box { margin-top: 1.5rem; padding: 1rem; border-radius: 0.5rem; background: #0ea5e920; border: 1px solid var(--primary); text-align: center; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Wine Quality Predictor</h2>
        <form action="/predict" method="post">
            <div class="grid">
                <div><label>Fixed Acidity</label><input type="text" name="fixed_acidity" value="7.4"></div>
                <div><label>Volatile Acidity</label><input type="text" name="volatile_acidity" value="0.7"></div>
                <div><label>Citric Acid</label><input type="text" name="citric_acid" value="0.0"></div>
                <div><label>Residual Sugar</label><input type="text" name="residual_sugar" value="1.9"></div>
                <div><label>Chlorides</label><input type="text" name="chlorides" value="0.076"></div>
                <div><label>Free Sulfur</label><input type="text" name="free_sulfur_dioxide" value="11.0"></div>
                <div><label>Total Sulfur</label><input type="text" name="total_sulfur_dioxide" value="34.0"></div>
                <div><label>Density</label><input type="text" name="density" value="0.9978"></div>
                <div><label>pH</label><input type="text" name="pH" value="3.51"></div>
                <div><label>Sulphates</label><input type="text" name="sulphates" value="0.56"></div>
            </div>
            <div class="full-width">
                <label>Alcohol</label>
                <input type="text" name="alcohol" value="9.4" style="margin-bottom: 1rem;">
                <button type="submit">Execute Prediction</button>
            </div>
        </form>
    </div>
</body>
</html>
